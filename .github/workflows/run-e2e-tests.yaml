name: E2E Test Workflow

# Runs the end-to-end suite (e2e-tests/) against a real Azure environment when a
# pull request is approved, on a monthly schedule, and on manual dispatch.
# This job checks out and executes arbitrary refs with real Azure/NR secrets
# present, so check-authorization requires: on pull_request_review, the
# approving reviewer to have admin access; on workflow_dispatch, the dispatched
# ref to be the default branch (otherwise any write-access collaborator could
# manually run this against their own branch with no review at all).
# Requires these repository secrets:
#   AZURE_CREDENTIALS (JSON: clientId, clientSecret, subscriptionId, tenantId - azure/login has no separate client-secret input)
#   AZURE_SUBSCRIPTION_ID (used by the test script itself, separate from login)
#   NR_LICENSE_KEY, NR_QUERY_API_KEY, NR_ACCOUNT_ID
#   SLACK_WEBHOOK_URL
on:
  pull_request_review:
    types: [submitted]
  schedule:
    - cron: '17 3 1 * *' # monthly, off-peak minute
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-authorization:
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
      - name: Verify this run is authorized to use secrets
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const defaultRef = `refs/heads/${context.payload.repository.default_branch}`;

            if (context.eventName === 'schedule') {
              // schedule always runs the workflow file + ref from the default branch - no user-controlled ref involved.
              core.info('Scheduled run - always executes against the default branch.');
              core.setOutput('authorized', 'true');
              return;
            }

            if (context.eventName === 'workflow_dispatch') {
              // Manual dispatch lets any collaborator with write access pick an arbitrary ref -
              // without this check that ref would run with secrets present, no review needed at all.
              if (context.ref !== defaultRef) {
                core.warning(`Manual dispatch targeted '${context.ref}', not the trusted ref '${defaultRef}' - refusing to run.`);
                core.setOutput('authorized', 'false');
                return;
              }
              core.info('Manual dispatch targeted the trusted default branch ref.');
              core.setOutput('authorized', 'true');
              return;
            }

            if (context.eventName !== 'pull_request_review') {
              // Fail closed on any trigger this workflow doesn't explicitly know how to authorize.
              core.warning(`Unexpected event '${context.eventName}' - refusing to run.`);
              core.setOutput('authorized', 'false');
              return;
            }

            const review = context.payload.review;

            if (review.state !== 'approved') {
              core.info(`Review state is '${review.state}', not 'approved' - not running.`);
              core.setOutput('authorized', 'false');
              return;
            }

            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: review.user.login,
            });

            if (permission.permission !== 'admin') {
              core.warning(`Reviewer ${review.user.login} has permission '${permission.permission}', not 'admin' - refusing to run.`);
              core.setOutput('authorized', 'false');
              return;
            }

            core.info(`Authorized: reviewer ${review.user.login} has admin access.`);
            core.setOutput('authorized', 'true');

  run-e2e:
    needs: [check-authorization]
    if: needs.check-authorization.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # On a review, test the PR head so the deployed function is the PR's code.
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Use Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm ci

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run e2e tests
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_REGION: centralus
          NR_LICENSE_KEY: ${{ secrets.NR_LICENSE_KEY }}
          NR_QUERY_API_KEY: ${{ secrets.NR_QUERY_API_KEY }}
          NR_ACCOUNT_ID: ${{ secrets.NR_ACCOUNT_ID }}
        run: npm run test:e2e

      - name: Send failure notification to Slack
        if: failure()
        uses: ravsamhq/notify-slack-action@v2
        with:
          status: ${{ job.status }}
          notify_when: 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
