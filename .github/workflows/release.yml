name: New Relic Azure VNet Flow Logs - Release

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [semantic-release]

env:
  GIT_AUTHOR_EMAIL: opensource+bot@newrelic.com
  GIT_AUTHOR_NAME: New Relic OpenSource Bot
  GIT_COMMITTER_EMAIL: opensource+bot@newrelic.com
  GIT_COMMITTER_NAME: New Relic OpenSource Bot

jobs:
  job-generate-third-party-notices:
    runs-on: ubuntu-latest
    concurrency:
      group: generate-third-party-notices
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        env:
          cache-name: node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.cache-name }}-

      - name: Install Dependencies
        run: npm ci

      - name: Install OSS CLI
        run: sudo npm install -g @newrelic/newrelic-oss-cli

      - name: Generate Third Party Notices
        id: generate-notices
        run: |
          if [ ! -f "third_party_manifest.json" ]; then
            echo "::error::third_party_manifest.json is missing. Must generate using the newrelic-oss-cli."
            exit 1
          fi

          LATEST_COMMIT=$(git rev-parse HEAD)
          LAST_CHANGED_COMMIT=$(git log -1 --format=format:%H --full-diff package.json)

          if [ "$LAST_CHANGED_COMMIT" = "$LATEST_COMMIT" ]; then
            oss third-party manifest
            oss third-party notices
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No change in package.json, not regenerating third-party notices"
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open Pull Request
        if: steps.generate-notices.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update third-party manifest and notices [skip ci]'
          author: '${{ env.GIT_AUTHOR_NAME }} <${{ env.GIT_AUTHOR_EMAIL }}>'
          committer: '${{ env.GIT_COMMITTER_NAME }} <${{ env.GIT_COMMITTER_EMAIL }}>'
          branch: bot/update-third-party-notices
          title: 'chore: update third-party manifest and notices'
          body: 'Automated update of `third_party_manifest.json` and `THIRD_PARTY_NOTICES.md` following a change to `package.json`.'

  job-generate-release:
    runs-on: ubuntu-latest
    needs: [job-generate-third-party-notices]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Download Cached Deps
        id: cache-node-modules
        uses: actions/cache@v4
        env:
          cache-name: node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.cache-name }}-

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
