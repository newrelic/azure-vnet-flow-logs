#!/usr/bin/env bash

# Required secrets
: "${AZURE_SUBSCRIPTION_ID:?Set AZURE_SUBSCRIPTION_ID}"
: "${AZURE_REGION:=centralus}"
: "${NR_LICENSE_KEY:?Set NR_LICENSE_KEY}"
: "${NR_QUERY_API_KEY:?Set NR_QUERY_API_KEY}"
: "${NR_ACCOUNT_ID:?Set NR_ACCOUNT_ID}"

# Optional overrides
: "${NR_GRAPHQL_ENDPOINT:=https://api.newrelic.com/graphql}"
: "${NR_LOG_ENDPOINT:=https://log-api.newrelic.com/log/v1}"
: "${TEST_TIMEOUT_FLOW_LOGS:=900}"
: "${TEST_TIMEOUT_NR_INGESTION:=300}"
: "${FLOW_LOG_POLL_INTERVAL:=30}"
: "${NR_POLL_INITIAL:=30}"
: "${NR_POLL_MAX:=180}"
: "${NR_POLL_RETRIES:=5}"
: "${VM_SIZE:=Standard_B1s}"
: "${VM_ADMIN_USERNAME:=azureuser}"
: "${VM_ADMIN_PUBLIC_KEY_PATH:=$HOME/.ssh/id_rsa.pub}"
: "${SCALING_MODE:=Basic}"
: "${DISABLE_PUBLIC_ACCESS_TO_STORAGE:=false}"
: "${MAX_RETRIES:=3}"
: "${RETRY_INTERVAL:=2000}"
: "${EVENT_HUB_BATCH_SIZE:=10}"
: "${FUNCTION_LOG_LEVEL:=Information}"
: "${SOURCE_STORAGE_ACCOUNT_NAME:=}"
: "${NETWORK_WATCHER_RG:=NetworkWatcherRG}"
: "${NETWORK_WATCHER_NAME:=}"

# Naming
RUN_TS="$(date +%s)"
RUN_ID="e2e-vnet-${RUN_TS}"
RESOURCE_GROUP="${RESOURCE_GROUP:-${RUN_ID}-rg}"
VNET_NAME="${VNET_NAME:-${RUN_ID}-vnet}"
SUBNET_NAME="${SUBNET_NAME:-default}"
NSG_NAME="${NSG_NAME:-${RUN_ID}-nsg}"
VM_NAME="${VM_NAME:-${RUN_ID}-vm}"
VM_PUBLIC_IP_NAME="${VM_PUBLIC_IP_NAME:-${RUN_ID}-pip}"
VM_NIC_NAME="${VM_NIC_NAME:-${RUN_ID}-nic}"
VNET_CIDR="${VNET_CIDR:-10.0.0.0/16}"
SUBNET_CIDR="${SUBNET_CIDR:-10.0.0.0/24}"

# Runtime artifacts
E2E_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
WORK_DIR="${WORK_DIR:-${E2E_DIR}/.work/${RUN_ID}}"
mkdir -p "${WORK_DIR}"
MARKER_FILE="${WORK_DIR}/marker.txt"
RAW_BLOB_FILE="${WORK_DIR}/raw-blob.json"
NR_RESULTS_FILE="${WORK_DIR}/nr-results.json"
DEPLOY_PACKAGE="${DEPLOY_PACKAGE:-VNetFlowForwarder.zip}"
FORWARDER_OUTPUTS_FILE="${WORK_DIR}/forwarder-outputs.json"
TRAFFIC_OUTPUTS_FILE="${WORK_DIR}/traffic-outputs.json"

FORWARDER_DEPLOYMENT_NAME="${FORWARDER_DEPLOYMENT_NAME:-${RUN_ID}-forwarder}"
TRAFFIC_DEPLOYMENT_NAME="${TRAFFIC_DEPLOYMENT_NAME:-${RUN_ID}-traffic}"

ARM_FORWARDER_TEMPLATE="${ARM_FORWARDER_TEMPLATE:-${E2E_DIR}/../arm/azuredeploy-vnetflowlogsforwarder.json}"
ARM_TRAFFIC_TEMPLATE="${ARM_TRAFFIC_TEMPLATE:-${E2E_DIR}/arm/azuredeploy-e2e-traffic.json}"

# Resource tags
TAG_PURPOSE="purpose=e2e-test"
TAG_CREATED_BY="created-by=ci"

# Set by deployment outputs
SOURCE_STORAGE=""
FUNCTION_APP_NAME=""
EVENTHUB_NAMESPACE=""
EVENTHUB_NAME=""
CURSOR_STORAGE=""
